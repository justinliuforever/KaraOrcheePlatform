name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: BUILD_SHA=${GITHUB_SHA::7} npm run build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker/pieces
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pieces/requirements.lock.txt
      # Tests exercise the pipeline math/XML paths — no fluidsynth/browsers needed.
      - run: pip install -r requirements.lock.txt
      - run: python -m pytest tests/ -q
